name: CI for Rust CLI App

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Set up Cachix (Optimizes Nix package caching)
        uses: cachix/cachix-action@v15
        with:
          name: devenv

      - name: Install Devenv Tool CLI
        run: nix profile install nixpkgs#devenv

      - name: Run Linter (Cargo Clippy)
        run: devenv shell format

      - name: Run Formatter (Cargo Format)
        run: devenv shell lint

      - name: Run Unit Tests (Cargo Test)
        run: devenv shell test
