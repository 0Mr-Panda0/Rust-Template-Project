name: CI for Rust CLI App

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-nix:
    name: Test (Nix)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Set up Cachix (Optimizes Nix package caching)
        uses: cachix/cachix-action@v15
        with:
          name: devenv

      - name: Install Devenv Tool CLI
        run: nix profile install nixpkgs#devenv

      - name: Run Formatter (Cargo Format)
        run: devenv shell format

      - name: Run Linter (Cargo Clippy)
        run: devenv shell lint

      - name: Run Unit Tests (Cargo Test)
        run: devenv shell test

  test-normal:
    name: Test (Non-Nix)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run Formatter (cargo fmt)
        run: cargo fmt --all -- --check

      - name: Run Linter (cargo clippy)
        run: cargo clippy -- -D warnings

      - name: Run Unit Tests (cargo test)
        run: cargo test -- --nocapture
